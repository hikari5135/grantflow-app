<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GrantFlow｜料金シミュレーター</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700;900&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

:root{
  --bg:#f5f4f0;
  --surface:#ffffff;
  --ink:#1a1a18;
  --ink2:#4a4a46;
  --ink3:#8a8a84;
  --green:#1a7a4a;
  --green-l:#e8f5ee;
  --green-m:#c4e8d4;
  --border:#e0dfd8;
  --border2:#c8c7be;
  --accent:#1a7a4a;
  --shadow:0 2px 12px rgba(0,0,0,.07);
  --shadow2:0 8px 32px rgba(0,0,0,.12);
}

body{
  font-family:'Noto Sans JP',sans-serif;
  background:var(--bg);
  color:var(--ink);
  min-height:100vh;
  padding:40px 20px 80px;
}

.wrap{max-width:760px;margin:0 auto;}

/* ヘッダー */
.header{text-align:center;margin-bottom:48px;}
.header-badge{
  display:inline-block;
  font-family:'DM Mono',monospace;
  font-size:10px;
  letter-spacing:.15em;
  text-transform:uppercase;
  color:var(--green);
  background:var(--green-l);
  border:1px solid var(--green-m);
  padding:4px 14px;
  border-radius:99px;
  margin-bottom:16px;
}
.header h1{
  font-size:clamp(24px,5vw,36px);
  font-weight:900;
  letter-spacing:-.02em;
  line-height:1.2;
  margin-bottom:10px;
}
.header p{font-size:14px;color:var(--ink2);line-height:1.8;}

/* 切り替えタブ */
.tab-wrap{
  display:flex;
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:12px;
  padding:4px;
  margin-bottom:28px;
  gap:4px;
}
.tab{
  flex:1;text-align:center;padding:10px;
  font-size:13px;font-weight:700;
  border-radius:9px;cursor:pointer;
  transition:all .2s;color:var(--ink3);
  border:none;background:none;font-family:inherit;
}
.tab.active{
  background:var(--ink);color:#fff;
  box-shadow:0 2px 8px rgba(0,0,0,.15);
}

/* アプリカード */
.apps-grid{display:flex;flex-direction:column;gap:10px;margin-bottom:28px;}

.app-card{
  background:var(--surface);
  border:1.5px solid var(--border);
  border-radius:14px;
  padding:18px 20px;
  display:flex;align-items:center;gap:16px;
  cursor:pointer;
  transition:all .2s;
  user-select:none;
}
.app-card:hover{border-color:var(--border2);box-shadow:var(--shadow);}
.app-card.selected{
  border-color:var(--green);
  background:var(--green-l);
  box-shadow:0 0 0 3px var(--green-m);
}

.app-checkbox{
  width:22px;height:22px;border-radius:6px;
  border:1.5px solid var(--border2);
  display:flex;align-items:center;justify-content:center;
  flex-shrink:0;transition:all .2s;
  background:#fff;
}
.app-card.selected .app-checkbox{
  background:var(--green);border-color:var(--green);
}
.app-checkbox svg{display:none;}
.app-card.selected .app-checkbox svg{display:block;}

.app-icon{font-size:26px;flex-shrink:0;}
.app-info{flex:1;min-width:0;}
.app-name{font-size:14px;font-weight:700;margin-bottom:2px;}
.app-desc{font-size:11px;color:var(--ink3);line-height:1.5;}
.app-tags{display:flex;gap:4px;margin-top:5px;flex-wrap:wrap;}
.app-tag{
  font-size:10px;padding:2px 7px;border-radius:99px;
  background:var(--bg);border:1px solid var(--border);
  color:var(--ink3);
}
.app-card.selected .app-tag{background:var(--green-m);border-color:var(--green-m);color:var(--green);}

.app-price{text-align:right;flex-shrink:0;}
.app-price-num{
  font-family:'DM Mono',monospace;
  font-size:16px;font-weight:500;
  color:var(--ink);
}
.app-price-unit{font-size:10px;color:var(--ink3);margin-top:1px;}

/* プリセットセット */
.presets-title{
  font-size:11px;font-weight:700;letter-spacing:.06em;
  text-transform:uppercase;color:var(--ink3);
  margin-bottom:10px;
}
.presets{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:8px;margin-bottom:28px;}
.preset-btn{
  background:var(--surface);
  border:1.5px solid var(--border);
  border-radius:10px;
  padding:12px 14px;
  cursor:pointer;
  text-align:left;
  transition:all .2s;
  font-family:inherit;
}
.preset-btn:hover{border-color:var(--border2);box-shadow:var(--shadow);}
.preset-btn.active-preset{border-color:var(--green);background:var(--green-l);}
.preset-name{font-size:12px;font-weight:700;margin-bottom:2px;color:var(--ink);}
.preset-target{font-size:10px;color:var(--ink3);line-height:1.5;}

/* 合計エリア */
.total-box{
  background:var(--ink);
  color:#fff;
  border-radius:16px;
  padding:28px 28px 24px;
  position:sticky;
  bottom:20px;
  box-shadow:var(--shadow2);
}
.total-top{display:flex;align-items:flex-start;justify-content:space-between;gap:16px;margin-bottom:20px;}
.total-left{}
.total-label{font-size:11px;color:rgba(255,255,255,.5);margin-bottom:4px;letter-spacing:.05em;}
.total-apps{font-size:12px;color:rgba(255,255,255,.7);margin-bottom:8px;line-height:1.6;min-height:20px;}
.total-price{
  font-family:'DM Mono',monospace;
  font-size:36px;font-weight:500;
  letter-spacing:-.02em;
  line-height:1;
}
.total-price span{font-size:14px;font-weight:400;color:rgba(255,255,255,.6);margin-left:4px;}
.total-right{text-align:right;flex-shrink:0;}
.discount-badge{
  display:inline-block;
  background:rgba(255,255,255,.12);
  border:1px solid rgba(255,255,255,.2);
  border-radius:8px;
  padding:8px 14px;
  font-size:12px;
  line-height:1.6;
}
.discount-label{color:rgba(255,255,255,.5);font-size:10px;}
.discount-val{color:#6ee7a8;font-weight:700;font-size:14px;}

.total-divider{border:none;border-top:1px solid rgba(255,255,255,.1);margin-bottom:16px;}

.total-bottom{display:flex;gap:10px;align-items:center;}
.buyout-info{
  flex:1;
  background:rgba(255,255,255,.06);
  border-radius:8px;
  padding:10px 14px;
  font-size:11px;
  color:rgba(255,255,255,.6);
  line-height:1.6;
}
.buyout-price{
  font-family:'DM Mono',monospace;
  font-size:16px;font-weight:500;color:#fff;
}
.cta-btn{
  background:#fff;color:var(--ink);
  border:none;border-radius:10px;
  padding:12px 20px;
  font-size:13px;font-weight:700;
  cursor:pointer;font-family:inherit;
  white-space:nowrap;
  transition:all .2s;
}
.cta-btn:hover{background:var(--green-l);color:var(--green);}

.none-msg{
  text-align:center;padding:16px;
  color:rgba(255,255,255,.4);font-size:13px;
}

/* 割引メッセージ */
.discount-msg{
  background:var(--green-l);
  border:1px solid var(--green-m);
  border-radius:10px;
  padding:10px 16px;
  font-size:12px;
  color:var(--green);
  margin-bottom:10px;
  text-align:center;
  font-weight:700;
  display:none;
}
.discount-msg.show{display:block;}
</style>
</head>
<body>
<div class="wrap">

  <div class="header">
    <div class="header-badge">GrantFlow — 料金シミュレーター</div>
    <h1>必要なアプリだけ<br>選んで試せます</h1>
    <p>5つのアプリから必要なものを選択してください。<br>合計金額がリアルタイムで表示されます。全プラン14日間無料トライアル付き。</p>
  </div>

  <!-- 月額 / 買い切り タブ -->
  <div class="tab-wrap">
    <button class="tab active" onclick="setMode('monthly')">月額プラン</button>
    <button class="tab" onclick="setMode('buyout')">買い切りプラン</button>
  </div>

  <!-- プリセット -->
  <div class="presets-title">おすすめの組み合わせ</div>
  <div class="presets">
    <button class="preset-btn" onclick="applyPreset('sharoushi')">
      <div class="preset-name">🏢 社労士フルセット</div>
      <div class="preset-target">社労士事務所向け<br>全5アプリ</div>
    </button>
    <button class="preset-btn" onclick="applyPreset('gyosei')">
      <div class="preset-name">📝 行政書士セット</div>
      <div class="preset-target">在留資格＋翻訳<br>①④の2アプリ</div>
    </button>
    <button class="preset-btn" onclick="applyPreset('jinji')">
      <div class="preset-name">🏭 企業人事セット</div>
      <div class="preset-target">人事部向け<br>①②④の3アプリ</div>
    </button>
    <button class="preset-btn" onclick="applyPreset('shien')">
      <div class="preset-name">🤝 支援機関セット</div>
      <div class="preset-target">登録支援機関向け<br>①③④の3アプリ</div>
    </button>
  </div>

  <!-- 割引メッセージ -->
  <div class="discount-msg" id="discount-msg">🎉 3アプリ以上のご選択で10%割引が適用されます！</div>

  <!-- アプリ一覧 -->
  <div class="apps-grid" id="apps-grid"></div>

  <!-- 合計ボックス -->
  <div class="total-box" id="total-box">
    <div class="none-msg" id="none-msg">アプリを選択してください</div>
    <div id="total-content" style="display:none">
      <div class="total-top">
        <div class="total-left">
          <div class="total-label">選択中のアプリ</div>
          <div class="total-apps" id="total-apps"></div>
          <div class="total-price" id="total-price">¥0<span id="price-unit">/月</span></div>
        </div>
        <div class="total-right">
          <div class="discount-badge" id="discount-badge" style="display:none">
            <div class="discount-label">割引額</div>
            <div class="discount-val" id="discount-val"></div>
          </div>
        </div>
      </div>
      <hr class="total-divider">
      <div class="total-bottom">
        <div class="buyout-info" id="buyout-info"></div>
        <button class="cta-btn" onclick="alert('14日間無料トライアルのお申し込みは\nメール or お問い合わせフォームよりご連絡ください。\n\nGrantFlow 阪本 光')">
          無料で試す →
        </button>
      </div>
    </div>
  </div>

</div>

<script>
const APPS = [
  {
    id:'a1', icon:'👥',
    name:'① 外国人雇用管理システム',
    desc:'在留資格・更新期限を一元管理。期日超過をゼロに',
    tags:['全顧客層','期日管理','在留資格'],
    monthly:5800, buyout:29800
  },
  {
    id:'a2', icon:'🌿',
    name:'② キャリアアップ助成金管理',
    desc:'STEP1〜6の申請フローを完全管理。書類整合性AIチェック付き',
    tags:['社労士向け','STEP管理','書類監査'],
    monthly:12800, buyout:98000
  },
  {
    id:'a3', icon:'🎓',
    name:'③ 人材開発支援助成金サポート',
    desc:'外国人スタッフ雇用助成金に特化。LINE通知・期限自動計算',
    tags:['支援機関','LINE通知','期限計算'],
    monthly:12800, buyout:98000
  },
  {
    id:'a4', icon:'🌐',
    name:'④ 労務翻訳・助成金診断',
    desc:'就業規則を多言語に翻訳。助成金の受給可能性をAI診断',
    tags:['行政書士','多言語翻訳','AI診断'],
    monthly:5800, buyout:29800
  },
  {
    id:'a5', icon:'🔗',
    name:'⑤ 労務支援統合プラットフォーム',
    desc:'①〜④＋法改正情報＋チーム共同編集。社労士事務所の旗艦ツール',
    tags:['社労士','チーム機能','法改正情報'],
    monthly:14800, buyout:118000
  },
  {
    id:'a6', icon:'📁',
    name:'⑥ 外国人雇用書類管理システム',
    desc:'在留カード・雇用契約書など12種類の書類を一元管理。提出状況・有効期限を自動アラート',
    tags:['書類管理','期限アラート','全顧客層'],
    monthly:5800, buyout:29800
  },
  {
    id:'a7', icon:'✅',
    name:'⑦ 在留資格チェックシステム',
    desc:'雇用前に就労可否を即座に判定。19種類の在留資格×業種×時間で不法就労リスクをゼロに',
    tags:['就労可否判定','行政書士','企業人事'],
    monthly:5800, buyout:29800
  },
  {
    id:'a8', icon:'🌏',
    name:'⑧ 多言語スタッフ管理システム',
    desc:'6言語対応。スタッフ情報・連絡事項・シフト・緊急連絡先を多言語で管理',
    tags:['多言語対応','シフト管理','緊急連絡先'],
    monthly:5800, buyout:29800
  },
  {
    id:'a9', icon:'🤖',
    name:'⑨ マルチビザ・タスク連動管理',
    desc:'スタッフ登録と同時に行政手続きタスクを自動生成。定期届出・ハローワーク・週28時間アラートまで一元管理',
    tags:['タスク自動生成','ハローワーク','週28h管理'],
    monthly:9800, buyout:78000
  },
  {
    id:'a10', icon:'🏢',
    name:'⑩ 登録支援機関 支援業務管理',
    desc:'法定11項目の支援実施記録・定期面談・生活オリエンテーション・入管庁への報告書を自動作成',
    tags:['登録支援機関','法定支援','報告書作成'],
    monthly:9800, buyout:78000
  },
  {
    id:'a11', icon:'🏠',
    name:'⑪ 外国人スタッフ 生活支援管理',
    desc:'住居・銀行・マイナンバー・健康保険・その他手続きを32項目のチェックリストで一元管理',
    tags:['生活支援','住居','銀行口座'],
    monthly:5800, buyout:29800
  },
  {
    id:'a12', icon:'💚',
    name:'⑫ メンタル・健康管理システム',
    desc:'5言語対応の健康アンケート・健康診断管理・リスクアラートで外国人スタッフの早期離職を防止',
    tags:['メンタルヘルス','5言語対応','離職防止'],
    monthly:5800, buyout:29800
  },
  {
    id:'a13', icon:'📈',
    name:'⑬ 定着率向上支援ツール',
    desc:'入社1ヶ月・3ヶ月・6ヶ月・1年の節目アンケートで離職リスクを早期発見。フォローアップ記録・定着率レポート付き',
    tags:['定着率向上','節目アンケート','離職リスク'],
    monthly:5800, buyout:29800
  }
];

const PRESETS = {
  sharoushi:['a1','a2','a3','a4','a5','a6','a7','a8','a9','a10','a11','a12','a13'],
  gyosei:['a1','a4','a7'],
  jinji:['a1','a2','a4','a6','a7','a8','a9','a11','a12','a13'],
  shien:['a1','a3','a4','a6','a8','a9','a10','a11','a12','a13']
};

let selected = new Set();
let mode = 'monthly';

function setMode(m){
  mode = m;
  document.querySelectorAll('.tab').forEach((t,i)=>{
    t.classList.toggle('active', (i===0&&m==='monthly')||(i===1&&m==='buyout'));
  });
  update();
}

function applyPreset(key){
  selected = new Set(PRESETS[key]);
  document.querySelectorAll('.preset-btn').forEach(b=>b.classList.remove('active-preset'));
  event.currentTarget.classList.add('active-preset');
  renderCards();
  update();
}

function toggleApp(id){
  if(selected.has(id)) selected.delete(id);
  else selected.add(id);
  document.querySelectorAll('.preset-btn').forEach(b=>b.classList.remove('active-preset'));
  renderCards();
  update();
}

function renderCards(){
  const grid = document.getElementById('apps-grid');
  grid.innerHTML = APPS.map(app=>`
    <div class="app-card ${selected.has(app.id)?'selected':''}" onclick="toggleApp('${app.id}')">
      <div class="app-checkbox">
        <svg width="12" height="10" viewBox="0 0 12 10" fill="none">
          <path d="M1 5L4.5 8.5L11 1" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </div>
      <div class="app-icon">${app.icon}</div>
      <div class="app-info">
        <div class="app-name">${app.name}</div>
        <div class="app-desc">${app.desc}</div>
        <div class="app-tags">${app.tags.map(t=>`<span class="app-tag">${t}</span>`).join('')}</div>
      </div>
      <div class="app-price">
        <div class="app-price-num">¥${(mode==='monthly'?app.monthly:app.buyout).toLocaleString()}</div>
        <div class="app-price-unit">${mode==='monthly'?'/月':'買い切り'}</div>
      </div>
    </div>
  `).join('');
}

function update(){
  const sel = APPS.filter(a=>selected.has(a.id));
  const noneMsg = document.getElementById('none-msg');
  const totalContent = document.getElementById('total-content');

  if(sel.length===0){
    noneMsg.style.display='block';
    totalContent.style.display='none';
    document.getElementById('discount-msg').classList.remove('show');
    return;
  }

  noneMsg.style.display='none';
  totalContent.style.display='block';

  const raw = sel.reduce((s,a)=>s+(mode==='monthly'?a.monthly:a.buyout),0);
  const discountRate = sel.length>=3 ? 0.10 : 0;
  const discounted = Math.round(raw*(1-discountRate));
  const discountAmt = raw - discounted;

  // 割引メッセージ
  const discMsg = document.getElementById('discount-msg');
  discMsg.classList.toggle('show', sel.length===1||sel.length===2);
  if(sel.length>=3) discMsg.classList.remove('show');

  // アプリ名
  document.getElementById('total-apps').textContent = sel.map(a=>a.icon+a.name.replace(/① |② |③ |④ |⑤ /,'')).join('、');

  // 合計金額
  document.getElementById('total-price').innerHTML =
    `¥${discounted.toLocaleString()}<span id="price-unit">${mode==='monthly'?'/月':'一括'}</span>`;

  // 割引バッジ
  const badge = document.getElementById('discount-badge');
  if(discountAmt>0){
    badge.style.display='inline-block';
    document.getElementById('discount-val').textContent = `¥${discountAmt.toLocaleString()} OFF`;
  } else {
    badge.style.display='none';
  }

  // 下部情報
  const buyoutInfo = document.getElementById('buyout-info');
  if(mode==='monthly'){
    const buyoutRaw = sel.reduce((s,a)=>s+a.buyout,0);
    const buyoutDisc = Math.round(buyoutRaw*(1-discountRate));
    buyoutInfo.innerHTML = `買い切りなら<br><span class="buyout-price">¥${buyoutDisc.toLocaleString()}</span> 一括（6か月以上でお得）`;
  } else {
    const monthlyRaw = sel.reduce((s,a)=>s+a.monthly,0);
    const monthlyDisc = Math.round(monthlyRaw*(1-discountRate));
    buyoutInfo.innerHTML = `月額プランなら<br><span class="buyout-price">¥${monthlyDisc.toLocaleString()}</span>/月から`;
  }
}

// 初期描画
renderCards();
update();
</script>
</body>
</html>
