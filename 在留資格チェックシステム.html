<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>在留資格チェックシステム｜GrantFlow</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700;900&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --ink:#1a1a18;--ink2:#3a3a36;--ink3:#7a7a72;
  --bg:#f2f1ec;--surface:#fff;--surface2:#f8f7f2;
  --border:#e2e1d8;--border2:#c8c7be;
  --green:#1a7a4a;--green-l:#e8f5ee;--green-m:#b8e0ca;
  --red:#c0392b;--red-l:#fdecea;--red-m:#f5b7b1;
  --amber:#c47a00;--amber-l:#fff8e6;--amber-m:#ffd97a;
  --blue:#1a5fa8;--blue-l:#e8f0fb;--blue-m:#a8c4ef;
  --purple:#6d28d9;--purple-l:#ede9fe;--purple-m:#c4b5fd;
  --r:10px;--r2:16px;
  --shadow:0 2px 8px rgba(0,0,0,.06);
  --shadow2:0 8px 24px rgba(0,0,0,.10);
}
body{font-family:'Noto Sans JP',sans-serif;background:var(--bg);color:var(--ink);min-height:100vh;font-size:14px;line-height:1.6;}

.layout{display:flex;min-height:100vh;}
.sidebar{width:240px;background:var(--ink);color:#fff;position:fixed;top:0;left:0;bottom:0;display:flex;flex-direction:column;z-index:100;}
.sidebar-logo{padding:20px 18px;border-bottom:1px solid rgba(255,255,255,.1);}
.logo-name{font-size:13px;font-weight:700;line-height:1.4;}
.logo-sub{font-size:10px;color:rgba(255,255,255,.45);margin-top:2px;}
.logo-badge{display:inline-block;margin-top:6px;font-size:9px;font-weight:700;background:var(--blue);color:#fff;padding:2px 8px;border-radius:4px;font-family:'DM Mono',monospace;}
.nav-section{padding:12px 0 4px;}
.nav-label{font-size:9px;font-weight:700;letter-spacing:.1em;color:rgba(255,255,255,.3);padding:0 18px;margin-bottom:4px;text-transform:uppercase;}
.nav-item{display:flex;align-items:center;gap:10px;padding:10px 18px;font-size:13px;font-weight:500;color:rgba(255,255,255,.6);cursor:pointer;border-left:3px solid transparent;transition:all .15s;}
.nav-item:hover{color:#fff;background:rgba(255,255,255,.06);}
.nav-item.active{color:#fff;border-left-color:var(--blue);background:rgba(255,255,255,.08);}
.nav-icon{font-size:16px;width:20px;text-align:center;}
.sidebar-footer{margin-top:auto;padding:14px 18px;border-top:1px solid rgba(255,255,255,.1);}
.user-row{display:flex;align-items:center;gap:8px;}
.user-av{width:28px;height:28px;border-radius:50%;background:var(--blue);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;}
.user-name{font-size:11px;font-weight:600;}
.user-role{font-size:10px;color:rgba(255,255,255,.4);}

.main{margin-left:240px;flex:1;}
.topbar{background:var(--surface);border-bottom:1px solid var(--border);padding:12px 24px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50;}
.topbar-title{font-size:16px;font-weight:700;}

.page{display:none;padding:24px;}
.page.active{display:block;}

.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r2);padding:20px;margin-bottom:14px;box-shadow:var(--shadow);}
.card-title{font-size:14px;font-weight:700;margin-bottom:16px;display:flex;align-items:center;gap:8px;}
.section-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;}
.section-title{font-size:18px;font-weight:700;}
.section-sub{font-size:13px;color:var(--ink3);margin-top:2px;}

.badge{display:inline-flex;align-items:center;padding:2px 10px;border-radius:6px;font-size:11px;font-weight:700;}
.badge-ok{background:var(--green-l);color:var(--green);}
.badge-ng{background:var(--red-l);color:var(--red);}
.badge-warn{background:var(--amber-l);color:var(--amber);}
.badge-info{background:var(--blue-l);color:var(--blue);}
.badge-purple{background:var(--purple-l);color:var(--purple);}
.badge-gray{background:var(--surface2);color:var(--ink3);border:1px solid var(--border);}

.btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;padding:9px 18px;border:1.5px solid var(--border2);border-radius:var(--r);font-size:13px;font-weight:600;font-family:inherit;cursor:pointer;transition:all .15s;background:var(--surface);color:var(--ink);}
.btn:hover{background:var(--surface2);}
.btn-blue{background:var(--blue);border-color:var(--blue);color:#fff;}
.btn-blue:hover{background:#154d8a;}
.btn-green{background:var(--green);border-color:var(--green);color:#fff;}
.btn-full{width:100%;}
.btn-row{display:flex;gap:8px;flex-wrap:wrap;margin-top:12px;}

.fg{display:flex;flex-direction:column;gap:4px;margin-bottom:14px;}
.fg label{font-size:11px;font-weight:700;color:var(--ink3);}
.fg select,.fg input{width:100%;padding:10px 12px;border:1.5px solid var(--border2);border-radius:var(--r);font-size:13px;font-family:inherit;color:var(--ink);background:var(--surface);outline:none;transition:border .15s;}
.fg select:focus,.fg input:focus{border-color:var(--blue);}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:12px;}

/* RESULT */
.result-box{border-radius:var(--r2);padding:20px;margin-bottom:14px;}
.result-ok{background:var(--green-l);border:2px solid var(--green-m);}
.result-ng{background:var(--red-l);border:2px solid var(--red-m);}
.result-warn{background:var(--amber-l);border:2px solid var(--amber-m);}
.result-title{font-size:20px;font-weight:900;margin-bottom:8px;}
.result-ok .result-title{color:var(--green);}
.result-ng .result-title{color:var(--red);}
.result-warn .result-title{color:var(--amber);}
.result-desc{font-size:13px;line-height:1.8;}

/* VISA CARD */
.visa-card{background:var(--surface);border:1.5px solid var(--border);border-radius:var(--r2);padding:18px;margin-bottom:10px;cursor:pointer;transition:all .2s;}
.visa-card:hover{border-color:var(--blue);box-shadow:var(--shadow);}
.visa-card.open{border-color:var(--blue);background:var(--blue-l);}
.visa-card-head{display:flex;align-items:center;gap:12px;}
.visa-card-icon{font-size:24px;flex-shrink:0;}
.visa-card-info{flex:1;}
.visa-card-name{font-size:14px;font-weight:700;margin-bottom:4px;}
.visa-card-sub{font-size:12px;color:var(--ink3);}
.visa-card-tags{display:flex;gap:4px;flex-wrap:wrap;margin-top:6px;}
.visa-card-body{display:none;margin-top:14px;padding-top:14px;border-top:1px solid var(--border2);}
.visa-card.open .visa-card-body{display:block;}

.info-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:10px;margin-bottom:12px;}
.info-item{background:var(--surface2);border-radius:var(--r);padding:10px 14px;}
.info-label{font-size:10px;font-weight:700;color:var(--ink3);margin-bottom:3px;text-transform:uppercase;letter-spacing:.05em;}
.info-val{font-size:13px;font-weight:600;}

.work-table{width:100%;border-collapse:collapse;font-size:12px;margin-top:8px;}
.work-table th{background:var(--surface2);padding:8px 10px;text-align:left;font-size:11px;font-weight:700;color:var(--ink3);border-bottom:1px solid var(--border);}
.work-table td{padding:8px 10px;border-bottom:1px solid var(--border);vertical-align:top;}
.work-table tr:last-child td{border-bottom:none;}

.check-row{display:flex;align-items:flex-start;gap:10px;padding:8px 0;border-bottom:1px solid var(--border);}
.check-row:last-child{border-bottom:none;}
.check-icon{font-size:16px;flex-shrink:0;margin-top:1px;}
.check-text{flex:1;font-size:13px;}
.check-sub{font-size:11px;color:var(--ink3);margin-top:2px;}

.tbl-wrap{overflow-x:auto;border-radius:var(--r2);border:1px solid var(--border);}
table.main-tbl{width:100%;border-collapse:collapse;font-size:13px;}
table.main-tbl thead th{background:var(--surface2);padding:10px 14px;text-align:left;font-size:11px;font-weight:700;color:var(--ink3);border-bottom:1px solid var(--border);}
table.main-tbl tbody td{padding:11px 14px;border-bottom:1px solid var(--border);vertical-align:middle;}
table.main-tbl tbody tr:last-child td{border-bottom:none;}
table.main-tbl tbody tr:hover{background:var(--surface2);}

.search-box{width:100%;padding:11px 14px;border:1.5px solid var(--border2);border-radius:var(--r);font-size:13px;font-family:inherit;outline:none;transition:border .15s;}
.search-box:focus{border-color:var(--blue);}

@media(max-width:768px){.sidebar{transform:translateX(-100%);}.main{margin-left:0;}.grid2{grid-template-columns:1fr;}}
</style>
</head>
<body>
<div class="layout">

<aside class="sidebar">
  <div class="sidebar-logo">
    <div class="logo-name">在留資格<br>チェックシステム</div>
    <div class="logo-sub">GrantFlow 在留資格</div>
    <div class="logo-badge">v1.0</div>
  </div>
  <div class="nav-section">
    <div class="nav-label">メニュー</div>
    <div class="nav-item active" onclick="showPage('pg-check')"><span class="nav-icon">✅</span>就労可否チェック</div>
    <div class="nav-item" onclick="showPage('pg-list')"><span class="nav-icon">📋</span>在留資格一覧</div>
    <div class="nav-item" onclick="showPage('pg-guide')"><span class="nav-icon">📖</span>更新・変更ガイド</div>
    <div class="nav-item" onclick="showPage('pg-history')"><span class="nav-icon">🕐</span>チェック履歴</div>
  </div>
  <div class="sidebar-footer">
    <div class="user-row">
      <div class="user-av">阪</div>
      <div><div class="user-name">阪本 光</div><div class="user-role">管理者</div></div>
    </div>
  </div>
</aside>

<div class="main">
  <div class="topbar">
    <div class="topbar-title" id="topbar-title">就労可否チェック</div>
  </div>

  <!-- 就労可否チェック -->
  <div class="page active" id="pg-check">
    <div class="section-header">
      <div>
        <div class="section-title">✅ 就労可否チェック</div>
        <div class="section-sub">在留資格と業種を入力して、雇用できるか即座に判定します</div>
      </div>
    </div>

    <div class="card">
      <div class="grid2">
        <div class="fg">
          <label>在留資格★</label>
          <select id="ck-visa" onchange="onVisaChange()">
            <option value="">選択してください</option>
            <optgroup label="就労制限なし">
              <option value="永住者">永住者</option>
              <option value="日本人の配偶者等">日本人の配偶者等</option>
              <option value="永住者の配偶者等">永住者の配偶者等</option>
              <option value="定住者">定住者</option>
            </optgroup>
            <optgroup label="就労可（職種制限あり）">
              <option value="技術・人文知識・国際業務">技術・人文知識・国際業務</option>
              <option value="特定技能1号">特定技能1号</option>
              <option value="特定技能2号">特定技能2号</option>
              <option value="技能">技能</option>
              <option value="介護">介護</option>
              <option value="教育">教育</option>
              <option value="医療">医療</option>
              <option value="企業内転勤">企業内転勤</option>
            </optgroup>
            <optgroup label="原則就労不可（許可が必要）">
              <option value="技能実習1号">技能実習1号</option>
              <option value="技能実習2号">技能実習2号</option>
              <option value="技能実習3号">技能実習3号</option>
              <option value="留学">留学</option>
              <option value="家族滞在">家族滞在</option>
            </optgroup>
            <optgroup label="就労不可">
              <option value="短期滞在">短期滞在</option>
              <option value="観光">観光</option>
            </optgroup>
          </select>
        </div>
        <div class="fg">
          <label>雇用予定の業種★</label>
          <select id="ck-industry">
            <option value="">選択してください</option>
            <option value="製造業">製造業</option>
            <option value="介護・福祉">介護・福祉</option>
            <option value="建設業">建設業</option>
            <option value="飲食・サービス">飲食・サービス</option>
            <option value="農業・漁業">農業・漁業</option>
            <option value="IT・情報通信">IT・情報通信</option>
            <option value="教育">教育</option>
            <option value="医療・医薬">医療・医薬</option>
            <option value="宿泊業">宿泊業</option>
            <option value="外食業">外食業</option>
            <option value="警備業">警備業</option>
            <option value="その他">その他</option>
          </select>
        </div>
        <div class="fg">
          <label>雇用形態</label>
          <select id="ck-type">
            <option value="正社員">正社員</option>
            <option value="パート・アルバイト">パート・アルバイト</option>
            <option value="派遣社員">派遣社員</option>
            <option value="契約社員">契約社員</option>
          </select>
        </div>
        <div class="fg">
          <label>週の予定労働時間</label>
          <select id="ck-hours">
            <option value="28以下">28時間以下</option>
            <option value="40以下">29〜40時間</option>
            <option value="40超">40時間超</option>
          </select>
        </div>
      </div>
      <button class="btn btn-blue btn-full" onclick="doCheck()" style="margin-top:4px">✅ 就労可否を判定する</button>
    </div>

    <div id="check-result" style="display:none"></div>
  </div>

  <!-- 在留資格一覧 -->
  <div class="page" id="pg-list">
    <div class="section-header">
      <div>
        <div class="section-title">📋 在留資格一覧</div>
        <div class="section-sub">各在留資格の就労可能範囲・制限・期間を確認できます</div>
      </div>
    </div>
    <div style="margin-bottom:14px">
      <input class="search-box" id="visa-search" placeholder="🔍 在留資格名・業種で検索..." oninput="renderVisaList()">
    </div>
    <div id="visa-list"></div>
  </div>

  <!-- 更新・変更ガイド -->
  <div class="page" id="pg-guide">
    <div class="section-header">
      <div>
        <div class="section-title">📖 更新・変更ガイド</div>
        <div class="section-sub">在留資格の更新・変更手続きの流れと必要書類</div>
      </div>
    </div>
    <div id="guide-content"></div>
  </div>

  <!-- チェック履歴 -->
  <div class="page" id="pg-history">
    <div class="section-header">
      <div>
        <div class="section-title">🕐 チェック履歴</div>
        <div class="section-sub">過去に行ったチェックの記録</div>
      </div>
      <button class="btn" onclick="clearHistory()">🗑️ 履歴をクリア</button>
    </div>
    <div id="history-list"></div>
  </div>
</div>
</div>

// ====== PAGES ======
function showPage(id){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.nav-item').forEach(n=>n.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  document.querySelector(`[onclick="showPage('${id}')"]`).classList.add('active');
  const titles={'pg-check':'就労可否チェック','pg-list':'在留資格一覧','pg-guide':'更新・変更ガイド','pg-history':'チェック履歴'};
  document.getElementById('topbar-title').textContent=titles[id]||'';
  if(id==='pg-list') renderVisaList();
  if(id==='pg-guide') renderGuide();
  if(id==='pg-history') renderHistory();
}

// ====== CHECK ======
function onVisaChange(){
  document.getElementById('check-result').style.display='none';
}

function doCheck(){
  const visa = document.getElementById('ck-visa').value;
  const industry = document.getElementById('ck-industry').value;
  const type = document.getElementById('ck-type').value;
  const hours = document.getElementById('ck-hours').value;
  if(!visa||!industry){alert('在留資格と業種を選択してください');return;}

  const data = VISA_DATA[visa];
  if(!data){return;}

  let result='', cls='', icon='', detail='', warnings=[];

  if(data.category==='就労不可'){
    result='就労不可';cls='ng';icon='🚫';
    detail=`<strong>${visa}</strong>の在留資格では、いかなる業種・形態でも就労することができません。<br>この方を雇用した場合、不法就労助長罪として<strong>3年以下の懲役または300万円以下の罰金</strong>の対象になります。`;
  } else if(data.category==='就労制限なし'){
    result='就労可能';cls='ok';icon='✅';
    detail=`<strong>${visa}</strong>の在留資格は就労制限がありません。<br><strong>${industry}</strong>での就労が可能です。雇用形態・労働時間の制限もありません。`;
  } else if(data.category==='就労可（職種制限あり）'){
    const allowedIndustries = data.industries.split(',');
    const allowed = allowedIndustries.includes(industry)||allowedIndustries.includes('すべて');
    if(allowed){
      result='就労可能';cls='ok';icon='✅';
      detail=`<strong>${visa}</strong>の在留資格で<strong>${industry}</strong>での就労は可能です。`;
      if(hours==='40超'){warnings.push('週40時間を超える労働は法定時間外労働となります。36協定の締結が必要です。');}
    } else {
      result='就労不可（業種制限）';cls='ng';icon='🚫';
      detail=`<strong>${visa}</strong>の在留資格では<strong>${industry}</strong>での就労はできません。<br>就労可能な業種：${data.industries}`;
    }
  } else if(data.category==='原則就労不可（許可が必要）'){
    if(data.permitNeeded){
      if(visa.includes('技能実習')){
        result='条件付き就労可';cls='warn';icon='⚠️';
        detail=`<strong>${visa}</strong>は、技能実習計画に定められた職種・作業のみ就労可能です。<br><strong>${industry}</strong>が実習計画に含まれている場合のみ就労できます。`;
        warnings.push('技能実習計画に定められた業務以外の作業をさせることは法律違反です。');
        warnings.push('監理団体による定期監査が必要です。');
      } else {
        if(hours==='28以下'){
          result='条件付き就労可';cls='warn';icon='⚠️';
          detail=`<strong>${visa}</strong>は「資格外活動許可」を取得している場合のみ、週28時間以内で就労可能です。`;
          warnings.push('必ず在留カード裏面の「資格外活動許可」の記載を確認してください。');
          warnings.push('週28時間を超えると不法就労になります。');
        } else {
          result='就労不可（時間超過）';cls='ng';icon='🚫';
          detail=`<strong>${visa}</strong>は週28時間以内でのみ就労可能です。選択された労働時間（${hours==='40以下'?'29〜40時間':'40時間超'}）では就労できません。`;
        }
      }
    }
  }

  const el=document.getElementById('check-result');
  el.style.display='block';
  el.innerHTML=`
    <div class="result-box result-${cls}">
      <div class="result-title">${icon} ${result}</div>
      <div class="result-desc">${detail}</div>
      ${warnings.length>0?`<div style="margin-top:12px">${warnings.map(w=>`<div style="display:flex;gap:8px;margin-top:6px"><span>⚠️</span><span style="font-size:12px">${w}</span></div>`).join('')}</div>`:''}
    </div>
    <div class="card">
      <div class="card-title">📋 ${visa} の詳細情報</div>
      <div class="info-grid">
        <div class="info-item"><div class="info-label">カテゴリ</div><div class="info-val">${data.category}</div></div>
        <div class="info-item"><div class="info-label">就労時間</div><div class="info-val">${data.hours}</div></div>
        <div class="info-item"><div class="info-label">在留期間</div><div class="info-val">${data.period}</div></div>
        <div class="info-item"><div class="info-label">更新</div><div class="info-val">${data.renewInfo}</div></div>
      </div>
      <div style="font-size:12px;color:var(--ink3);background:var(--surface2);border-radius:var(--r);padding:10px 14px;margin-top:8px;line-height:1.7">${data.notes}</div>
      <div class="btn-row">
        <button class="btn btn-blue" onclick="showPage('pg-guide')">📖 更新・変更手続きを確認</button>
      </div>
    </div>`;

  // 履歴保存
  history.unshift({visa,industry,type,hours,result,cls,at:new Date().toISOString()});
  if(history.length>20) history=history.slice(0,20);
  localStorage.setItem('grantflow_visa_history',JSON.stringify(history));
  el.scrollIntoView({behavior:'smooth',block:'start'});
}

// ====== VISA LIST ======
function renderVisaList(){
  const q=(document.getElementById('visa-search')||{}).value||'';
  const el=document.getElementById('visa-list');
  const keys=Object.keys(VISA_DATA).filter(k=>k.includes(q)||VISA_DATA[k].industries.includes(q)||VISA_DATA[k].work.includes(q));
  const cats=['就労制限なし','就労可（職種制限あり）','原則就労不可（許可が必要）','就労不可'];
  let html='';
  cats.forEach(cat=>{
    const items=keys.filter(k=>VISA_DATA[k].category===cat);
    if(items.length===0) return;
    const catColor={
      '就労制限なし':'badge-ok',
      '就労可（職種制限あり）':'badge-info',
      '原則就労不可（許可が必要）':'badge-warn',
      '就労不可':'badge-ng'
    }[cat]||'badge-gray';
    html+=`<div style="margin-bottom:6px;margin-top:16px"><span class="badge ${catColor}" style="font-size:12px;padding:4px 12px">${cat}</span></div>`;
    items.forEach(k=>{
      const d=VISA_DATA[k];
      html+=`
      <div class="visa-card" id="vc-${k.replace(/[^a-z0-9]/gi,'_')}" onclick="toggleVisa('${k.replace(/'/g,"\\'")}')">
        <div class="visa-card-head">
          <div class="visa-card-icon">${d.color==='green'?'🟢':d.color==='blue'?'🔵':d.color==='amber'?'🟡':'🔴'}</div>
          <div class="visa-card-info">
            <div class="visa-card-name">${k}</div>
            <div class="visa-card-sub">在留期間：${d.period} | 就労時間：${d.hours}</div>
            <div class="visa-card-tags">
              ${d.industries!=='なし'?d.industries.split(',').map(i=>`<span class="badge badge-gray" style="font-size:10px">${i}</span>`).join(''):'<span class="badge badge-ng" style="font-size:10px">就労不可</span>'}
            </div>
          </div>
          <span style="color:var(--ink3);font-size:12px">▼ 詳細</span>
        </div>
        <div class="visa-card-body">
          <div class="info-grid" style="margin-bottom:12px">
            <div class="info-item"><div class="info-label">就労可能業務</div><div class="info-val" style="font-size:12px;line-height:1.5">${d.work}</div></div>
            <div class="info-item"><div class="info-label">更新情報</div><div class="info-val" style="font-size:12px;line-height:1.5">${d.renewInfo}</div></div>
          </div>
          <div style="font-size:12px;color:var(--ink2);background:var(--surface2);border-radius:var(--r);padding:10px 14px;margin-bottom:10px;line-height:1.7">${d.notes}</div>
          ${d.docs.length>0?`
          <div style="font-size:11px;font-weight:700;color:var(--ink3);margin-bottom:6px">必要書類（更新時）</div>
          <div style="display:flex;flex-wrap:wrap;gap:6px">
            ${d.docs.map(doc=>`<span class="badge badge-gray">${doc}</span>`).join('')}
          </div>`:''}
          <div class="btn-row">
            <button class="btn btn-blue btn-sm" onclick="event.stopPropagation();document.getElementById('ck-visa').value='${k}';showPage('pg-check')">✅ このビザでチェック</button>
          </div>
        </div>
      </div>`;
    });
  });
  el.innerHTML=html||'<div class="card" style="text-align:center;color:var(--ink3);padding:32px">該当する在留資格が見つかりません</div>';
}

function toggleVisa(key){
  const id='vc-'+key.replace(/[^a-z0-9]/gi,'_');
  const card=document.getElementById(id);
  if(card) card.classList.toggle('open');
}

          </div>
          <div class="check-text">
            <strong>${s.title}</strong>
            <div class="check-sub">${s.desc}</div>
          </div>
        </div>`).join('')}
      <div style="margin-top:12px;padding:10px 14px;background:var(--amber-l);border:1px solid var(--amber-m);border-radius:var(--r);font-size:12px;color:var(--amber);line-height:1.7">${g.note}</div>
    </div>`).join('');
}

// ====== HISTORY ======
function renderHistory(){
  const el=document.getElementById('history-list');
  if(history.length===0){
    el.innerHTML='<div class="card" style="text-align:center;color:var(--ink3);padding:32px">チェック履歴がありません</div>';
    return;
  }
  el.innerHTML=`<div class="tbl-wrap"><table class="main-tbl"><thead><tr><th>日時</th><th>在留資格</th><th>業種</th><th>労働時間</th><th>判定結果</th></tr></thead><tbody>`+
    history.map(h=>{
      const d=new Date(h.at);
      const dateStr=`${d.getMonth()+1}/${d.getDate()} ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
      const badgeCls=h.cls==='ok'?'badge-ok':h.cls==='ng'?'badge-ng':'badge-warn';
      return `<tr><td style="font-size:11px;color:var(--ink3)">${dateStr}</td><td style="font-weight:600">${h.visa}</td><td>${h.industry}</td><td>${h.hours}</td><td><span class="badge ${badgeCls}">${h.result}</span></td></tr>`;
    }).join('')+'</tbody></table></div>';
}

function clearHistory(){
  if(!confirm('履歴をすべて削除しますか？')) return;
  history=[];
  localStorage.removeItem('grantflow_visa_history');
  renderHistory();
}

// INIT
renderVisaList();
renderGuide();
</script>
